<!-- Enquete: Setlist de Rock -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Teko:wght@500;600;700&display=swap');

  :root {
    --bg: #0c0b0a;
    --bg-raised: #17140f;
    --paper: #efe6d3;
    --rust: #b23a1e;
    --rust-bright: #e4531f;
    --gold: #c9a24b;
    --line: #3a322a;
    --text-dim: #a89e8c;
  }

  #poll-root * { box-sizing: border-box; }

  #poll-root {
    background: var(--bg);
    color: var(--paper);
    font-family: 'Oswald', sans-serif;
    padding: 28px 20px 40px;
    border-radius: 4px;
    background-image:
      radial-gradient(ellipse at top left, rgba(178,58,30,0.12), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(201,162,75,0.08), transparent 55%);
  }

  .ticket-head {
    text-align: center;
    border-bottom: 2px dashed var(--line);
    padding-bottom: 18px;
    margin-bottom: 22px;
    position: relative;
  }

  .eyebrow {
    letter-spacing: 6px;
    font-size: 11px;
    color: var(--rust-bright);
    text-transform: uppercase;
    font-weight: 600;
  }

  .headline {
    font-family: 'Teko', sans-serif;
    font-size: 56px;
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--paper);
    text-shadow: 0 0 18px rgba(228,83,31,0.35);
    margin: 4px 0 6px;
  }

  .sub {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
  }

  .counter {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 16px;
    margin-bottom: 18px;
    font-family: 'Teko', sans-serif;
    font-size: 24px;
    letter-spacing: 0.5px;
  }

  .counter span.n { color: var(--rust-bright); font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .track {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 12px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .track:hover { border-color: var(--gold); }

  .track.checked {
    border-color: var(--rust-bright);
    background: linear-gradient(90deg, rgba(178,58,30,0.18), transparent);
  }

  .track input { accent-color: var(--rust-bright); margin-top: 2px; flex-shrink: 0; }

  .track .num {
    font-family: 'Teko', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    width: 24px;
    flex-shrink: 0;
  }

  .track .label { font-size: 14px; line-height: 1.3; }
  .track .artist { color: var(--gold); font-weight: 600; }

  .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  button.submit {
    font-family: 'Teko', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    background: var(--rust-bright);
    color: #12100c;
    border: none;
    padding: 10px 30px;
    border-radius: 2px;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 0 0 1px rgba(228,83,31,0.5);
  }

  button.submit:disabled {
    background: var(--line);
    color: var(--text-dim);
    cursor: not-allowed;
    box-shadow: none;
  }

  button.ghost {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 2px;
    cursor: pointer;
  }
  button.ghost:hover { border-color: var(--gold); color: var(--gold); }

  .msg { font-size: 13px; color: var(--rust-bright); }

  .results {
    margin-top: 28px;
    border-top: 2px dashed var(--line);
    padding-top: 20px;
  }

  .results h3 {
    font-family: 'Teko', sans-serif;
    font-size: 30px;
    letter-spacing: 1px;
    margin: 0 0 14px;
    color: var(--gold);
  }

  .bar-row { margin-bottom: 10px; }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 3px;
  }
  .bar-label .votes { color: var(--rust-bright); font-weight: 600; }

  .bar-track {
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 2px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rust), var(--rust-bright));
    transition: width 0.4s ease;
  }

  .empty-note { color: var(--text-dim); font-size: 13px; }

  @media (max-width: 480px) {
    .headline { font-size: 42px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>

<div id="poll-root">
  <div class="ticket-head">
    <div class="eyebrow">Enquete &middot; Escolha o Setlist</div>
    <div class="headline">NOITE DO ROCK</div>
    <div class="sub">Marque até 12 músicas que não podem ficar de fora do show. Os votos são somados em tempo real.</div>
  </div>

  <div class="counter">
    <span>Selecionadas</span>
    <span><span class="n" id="sel-count">0</span> / 12</span>
  </div>

  <div class="grid" id="track-grid"></div>

  <div class="actions">
    <button class="submit" id="submit-btn" disabled>Enviar Voto</button>
    <button class="ghost" id="toggle-results">Ver Resultados</button>
    <span class="msg" id="msg"></span>
  </div>

  <div class="results" id="results-panel" style="display:none;">
    <h3>Resultado ao Vivo</h3>
    <div id="results-list"></div>
  </div>
</div>

<script>
(function() {
  const SONGS = [
    "Metallica — Enter Sandman",
    "Guns N' Roses — Sweet Child O' Mine",
    "Iron Maiden — Fear of the Dark",
    "Ozzy Osbourne — Crazy Train",
    "Ozzy Osbourne — No More Tears",
    "Pearl Jam — Alive",
    "Pearl Jam — Jeremy",
    "System of a Down — Aerials",
    "Pink Floyd — Comfortably Numb",
    "Eagles — Hotel California",
    "Led Zeppelin — Immigrant Song",
    "Deep Purple — Smoke on the Water",
    "Deep Purple — Highway Star",
    "Aerosmith — Dream On",
    "Alice in Chains — Man in the Box",
    "Scorpions — Still Loving You",
    "Creed — My Sacrifice",
    "Creed — One Last Breath",
    "Survivor — Eye of the Tiger",
    "Guns N' Roses — Welcome to the Jungle",
    "Metallica — Wherever I May Roam",
    "Metallica — One",
    "Metallica — Fade to Black",
    "Metallica — Ride the Lightning",
    "Metallica — The Unforgiven",
    "Metallica — King Nothing",
    "Guns N' Roses — Civil War",
    "Guns N' Roses — You Could Be Mine",
    "Guns N' Roses — Don't Cry",
    "Iron Maiden — Wasted Years",
    "Iron Maiden — The Trooper",
    "Iron Maiden — 2 Minutes to Midnight",
    "Linkin Park — Papercut",
    "Linkin Park — One Step Closer",
    "Linkin Park — In the End",
    "Bon Jovi — Always",
    "Bon Jovi — You Give Love a Bad Name",
    "Bon Jovi — Livin' On a Prayer",
    "Korn — Blind",
    "Korn — Falling Away from Me",
    "Korn — Freak on a Leash",
    "Limp Bizkit — My Generation",
    "Limp Bizkit — Hot Dog",
    "Limp Bizkit — Boiler",
    "Rush — Tom Sawyer",
    "Living Colour — Cult of Personality",
    "Michael Jackson — Beat It"
  ];

  const MAX_PICKS = 12;
  const VOTES_KEY = 'setlist-votes';
  const selected = new Set();
  let voted = false;

  const grid = document.getElementById('track-grid');
  const selCount = document.getElementById('sel-count');
  const submitBtn = document.getElementById('submit-btn');
  const msg = document.getElementById('msg');
  const toggleBtn = document.getElementById('toggle-results');
  const resultsPanel = document.getElementById('results-panel');
  const resultsList = document.getElementById('results-list');

  SONGS.forEach((song, i) => {
    const [artist, title] = song.split(' — ');
    const row = document.createElement('label');
    row.className = 'track';
    row.innerHTML = `
      <input type="checkbox" data-idx="${i}" />
      <span class="num">${String(i + 1).padStart(2, '0')}</span>
      <span class="label"><span class="artist">${artist}</span> — ${title}</span>
    `;
    const cb = row.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) {
        if (selected.size >= MAX_PICKS) {
          cb.checked = false;
          msg.textContent = `Máximo de ${MAX_PICKS} músicas.`;
          return;
        }
        selected.add(i);
        row.classList.add('checked');
      } else {
        selected.delete(i);
        row.classList.remove('checked');
      }
      msg.textContent = '';
      selCount.textContent = selected.size;
      submitBtn.disabled = selected.size === 0 || voted;
    });
    grid.appendChild(row);
  });

  async function getVotes() {
    try {
      const res = await window.storage.get(VOTES_KEY, true);
      return res ? JSON.parse(res.value) : {};
    } catch (e) {
      return {};
    }
  }

  async function saveVotes(votes) {
    try {
      await window.storage.set(VOTES_KEY, JSON.stringify(votes), true);
    } catch (e) {
      console.error('Erro ao salvar votos', e);
    }
  }

  async function renderResults() {
    const votes = await getVotes();
    const entries = SONGS.map((song, i) => [song, votes[i] || 0])
      .filter(([, v]) => v > 0)
      .sort((a, b) => b[1] - a[1]);

    if (entries.length === 0) {
      resultsList.innerHTML = '<div class="empty-note">Ninguém votou ainda. Seja o primeiro!</div>';
      return;
    }

    const max = entries[0][1];
    resultsList.innerHTML = entries.map(([song, v]) => `
      <div class="bar-row">
        <div class="bar-label"><span>${song}</span><span class="votes">${v}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(v / max) * 100}%"></div></div>
      </div>
    `).join('');
  }

  submitBtn.addEventListener('click', async () => {
    if (selected.size === 0 || voted) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';
    const votes = await getVotes();
    selected.forEach(i => { votes[i] = (votes[i] || 0) + 1; });
    await saveVotes(votes);
    voted = true;
    submitBtn.textContent = 'Voto Enviado';
    msg.textContent = 'Obrigado! Confira os resultados ao vivo.';
    resultsPanel.style.display = 'block';
    toggleBtn.textContent = 'Ocultar Resultados';
    renderResults();
  });

  toggleBtn.addEventListener('click', () => {
    const isHidden = resultsPanel.style.display === 'none';
    resultsPanel.style.display = isHidden ? 'block' : 'none';
    toggleBtn.textContent = isHidden ? 'Ocultar Resultados' : 'Ver Resultados';
    if (isHidden) renderResults();
  });
})();
</script>
